version: '3.9'

services:
  backend:
    build: ./backend
    container_name: immigration_backend
    restart: unless-stopped
    environment:
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme123}
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
    volumes:
      - db_data:/app
    networks:
      - app_network

  frontend:
    build: ./frontend
    container_name: immigration_frontend
    restart: unless-stopped
    ports:
      - "3080:80"
    depends_on:
      - backend
    networks:
      - app_network

volumes:
  db_data:

networks:
  app_network:
    driver: bridge
